      - "N4-02 — Inversão (Never have I... / Not only...)": N4-02-inversao.md
      - "N4-03 — Cleft Sentences (What I need is...)": N4-03-cleft-sentences.md
      - "N4-04 — Subjuntivo e Estruturas Formais (I suggest that he be...)": N4-04-subjuntivo-formal.md
      - "N4-05 — Elipse e Substituição (so do I / neither do I)": N4-05-elipse-substituicao.md
      - "N4-06 — Collocations e chunks (make vs do, heavy rain)": N4-06-collocations-chunks.md
      - "N4-07 — Registro: formal vs informal": N4-07-registro-formal-informal.md
      - "N4-08 — Hedging e modalidade fina (would tend to / arguably)": N4-08-hedging-modalidade.md
  - "N5 · Avançado / IELTS (C1)":
      - "N5-01 — Writing Acadêmico: Estrutura de Essay": N5-01-writing-academico-essay.md
      - "N5-02 — IELTS Writing Task 1 (gráficos e cartas)": N5-02-ielts-writing-task-1.md
      - "N5-03 — IELTS Writing Task 2 (Opinion Essay)": N5-03-ielts-writing-task-2.md
      - "N5-04 — IELTS Speaking: as 3 partes": N5-04-ielts-speaking.md
      - "N5-05 — IELTS Listening: estratégias": N5-05-ielts-listening.md
      - "N5-06 — IELTS Reading: Skimming e Scanning": N5-06-ielts-reading.md
      - "N5-07 — Idioms e Linguagem Natural": N5-07-idioms-linguagem-natural.md
      - "N5-08 — Nuances finais: artigos avançados, aspecto, ênfase": N5-08-nuances-finais.md
