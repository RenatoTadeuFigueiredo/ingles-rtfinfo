site_name: Inglês do Zero ao Avançado
site_description: Curso completo de inglês do zero ao avançado (A0 → C1), em português, com mapa de dependências entre os temas e preparação para o IELTS.
site_url: https://ingles.rtfinfo.com/
site_author: rtfinfo
copyright: Conteúdo de estudo · rtfinfo.com

theme:
  name: material
  language: pt-BR
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Nunito
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Modo claro

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - abbr
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: pt

nav:
  - Início: index.md
  - Mapa do currículo: mapa.md
  - "N0 · Fundação (A0–A1)":
      - "N0-01 — Alfabeto, sons e pronúncia básica": N0-01-alfabeto-sons-pronuncia.md
      - "N0-02 — Pronomes pessoais (I, you, he, she...)": N0-02-pronomes-pessoais.md
      - "N0-03 — Verb to be (am / is / are)": N0-03-verb-to-be.md
      - "N0-04 — Estrutura da frase: Sujeito-Verbo-Objeto (SVO)": N0-04-estrutura-da-frase-svo.md
      - "N0-05 — Artigos (a / an / the)": N0-05-artigos.md
      - "N0-06 — Substantivos e Plural (Nouns and Plurals)": N0-06-substantivos-e-plural.md
      - "N0-07 — Adjetivos (posição e uso)": N0-07-adjetivos.md
      - "N0-08 — Possessivos (my / your / 's)": N0-08-possessivos.md
      - "N0-09 — Demonstrativos (this / that / these / those)": N0-09-demonstrativos.md
      - "N0-10 — Presente Simples (Present Simple)": N0-10-presente-simples.md
      - "N0-11 — Perguntas e question words (what / where / who...)": N0-11-perguntas-question-words.md
      - "N0-12 — There is / There are": N0-12-there-is-there-are.md
      - "N0-13 — Can / Can't (habilidade e permissão)": N0-13-can-cant.md
      - "N0-14 — Preposições de lugar e tempo (in / on / at)": N0-14-preposicoes-lugar-tempo.md
      - "N0-15 — Números, datas e horas": N0-15-numeros-datas-horas.md
      - "N0-16 — Imperativo (Imperative)": N0-16-imperativo.md
  - "N1 · Básico (A2)":
      - "N1-01 — Presente Contínuo (am doing)": N1-01-presente-continuo.md
      - "N1-02 — Presente Simples vs Contínuo (I do vs I am doing)": N1-02-presente-simples-vs-continuo.md
      - "N1-03 — Passado Simples: Verbos Regulares (-ed)": N1-03-passado-simples-regulares.md
      - "N1-04 — Passado simples: irregulares + did": N1-04-passado-simples-irregulares.md
      - "N1-05 — Passado Contínuo (was doing)": N1-05-passado-continuo.md
      - "N1-06 — Futuro: going to": N1-06-futuro-going-to.md
      - "N1-07 — Futuro: will": N1-07-futuro-will.md
      - "N1-08 — Contáveis e Incontáveis (Countable & Uncountable Nouns)": N1-08-contaveis-incontaveis.md
      - "N1-09 — Some / Any / Much / Many / A lot of": N1-09-some-any-much-many.md
      - "N1-10 — Comparativos e Superlativos (cheaper / the cheapest)": N1-10-comparativos-superlativos.md
      - "N1-11 — Advérbios de frequência e modo (always, usually / quickly, well)": N1-11-adverbios-frequencia-modo.md
      - "N1-12 — Pronomes objeto (me / him / them)": N1-12-pronomes-objeto.md
      - "N1-13 — Verbos + -ing (like / love / hate doing)": N1-13-verbos-ing.md
      - "N1-14 — Conjunções básicas (and / but / because / so)": N1-14-conjuncoes-basicas.md
      - "N1-15 — Phrasal Verbs I (os 20 mais comuns)": N1-15-phrasal-verbs-1.md
  - "N2 · Pré-intermediário (B1)":
      - "N2-01 — Present Perfect (have done)": N2-01-present-perfect.md
      - "N2-02 — Present Perfect vs Past Simple": N2-02-present-perfect-vs-past-simple.md
      - "N2-03 — For / since / already / yet / just / ever / never": N2-03-for-since-already-yet.md
      - "N2-04 — Condicional Zero (Zero Conditional)": N2-04-condicional-zero.md
      - "N2-05 — Primeira Condicional (First Conditional)": N2-05-primeira-condicional.md
      - "N2-06 — Modais: should / must / have to / might": N2-06-modais-should-must-have-to.md
      - "N2-07 — Verbos + gerúndio ou infinitivo (stop doing / stop to do)": N2-07-gerundio-ou-infinitivo.md
      - "N2-08 — Used to (hábitos do passado)": N2-08-used-to.md
      - "N2-09 — Relative clauses básicas (who / which / that)": N2-09-relative-clauses-basicas.md
      - "N2-10 — Voz Passiva: Presente e Passado (Passive Voice)": N2-10-voz-passiva-presente-passado.md
      - "N2-11 — Question Tags (isn't it? / don't you?)": N2-11-question-tags.md
      - "N2-12 — Quantificadores avançados (few / little / enough / too)": N2-12-quantificadores-avancados.md
      - "N2-13 — Phrasal Verbs II": N2-13-phrasal-verbs-2.md
  - "N3 · Intermediário (B1+/B2)":
      - "N3-01 — Segunda Condicional (Second Conditional)": N3-01-segunda-condicional.md
      - "N3-02 — Terceira Condicional (Third Conditional)": N3-02-terceira-condicional.md
      - "N3-03 — Mixed Conditionals (condicionais mistas)": N3-03-mixed-conditionals.md
      - "N3-04 — Present Perfect Continuous (have been doing)": N3-04-present-perfect-continuous.md
      - "N3-05 — Past Perfect (had done / had been doing)": N3-05-past-perfect.md
      - "N3-06 — Reported Speech (she said that...)": N3-06-reported-speech.md
      - "N3-07 — Voz Passiva: Todos os Tempos (Passive Voice: All Tenses)": N3-07-voz-passiva-todos-tempos.md
      - "N3-08 — Relative Clauses Avançadas (whose / where / non-defining)": N3-08-relative-clauses-avancadas.md
      - "N3-09 — Modais de dedução (must be / can't be / might have)": N3-09-modais-deducao.md
      - "N3-10 — Wish / If only": N3-10-wish-if-only.md
      - "N3-11 — Conectores discursivos (however / although / despite)": N3-11-conectores-discursivos.md
      - "N3-12 — Futuro Contínuo e Futuro Perfeito (will be doing / will have done)": N3-12-futuro-continuo-perfeito.md
      - "N3-13 — Gerúndio e Infinitivo Avançado (Gerunds & Infinitives)": N3-13-gerundio-infinitivo-avancado.md
  - "N4 · Intermediário-alto (B2+)":
